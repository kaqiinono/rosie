
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  .quiz-wrap { font-family:'Nunito',sans-serif; max-width:560px; margin:0 auto; padding:1.5rem 1rem 2rem; min-height:500px; position:relative; }
  .phase-label { font-size:12px; font-weight:700; color:var(--color-text-secondary); letter-spacing:.08em; text-transform:uppercase; margin-bottom:.5rem; }
  .question-box { background:var(--color-background-secondary); border-radius:16px; padding:1.25rem 1.5rem; margin-bottom:1.25rem; border:.5px solid var(--color-border-tertiary); }
  .definition-text { font-size:17px; font-weight:600; color:var(--color-text-primary); line-height:1.6; margin:0; }
  .choices-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1.25rem; }
  .choice-btn { background:var(--color-background-primary); border:1.5px solid var(--color-border-secondary); border-radius:12px; padding:.75rem 1rem; font-family:'Nunito',sans-serif; font-size:16px; font-weight:700; color:var(--color-text-primary); cursor:pointer; transition:transform .12s,border-color .12s,background .12s; min-height:56px; text-align:center; }
  .choice-btn:hover:not(:disabled) { transform:translateY(-2px); border-color:#7F77DD; background:#EEEDFE; color:#3C3489; }
  .choice-btn.correct { background:#EAF3DE; border-color:#639922; color:#3B6D11; animation:bounce-in .35s ease; }
  .choice-btn.wrong { background:#FCEBEB; border-color:#E24B4A; color:#791F1F; animation:shake .4s ease; }
  @keyframes bounce-in { 0%{transform:scale(1)} 40%{transform:scale(1.08)} 70%{transform:scale(.96)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .progress-row { display:flex; align-items:center; gap:10px; margin-bottom:1.25rem; }
  .progress-bar-bg { flex:1; height:8px; background:var(--color-background-secondary); border-radius:99px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,#7F77DD,#5DCAA5); border-radius:99px; transition:width .4s ease; }
  .progress-text { font-size:13px; font-weight:700; color:var(--color-text-secondary); white-space:nowrap; }
  .star { font-size:20px; transition:transform .2s; }
  .star.dim { opacity:.2; }

  /* === EAT SCENE === */
  #eat-stage {
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:200;
    gap:0;
  }

  /* 整体卡片容器 */
  #eat-card {
    background:#fff;
    border-radius:24px;
    padding:1.5rem 1.25rem 1.25rem;
    width:300px;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    position:relative;
    overflow:hidden;
  }

  /* 动画舞台：字在上，嘴巴对齐 */
  #eat-canvas {
    width:280px;
    height:280px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* word chip that flies into mouth */
  #flying-word {
    position:absolute;
    /* 起始：在画布正上方 */
    top:10px; left:50%;
    transform:translateX(-50%);
    background:linear-gradient(135deg,#7F77DD,#5DCAA5);
    border-radius:12px;
    padding:8px 22px;
    font-family:'Nunito',sans-serif;
    font-size:22px;
    font-weight:800;
    color:#fff;
    box-shadow:0 4px 18px rgba(127,119,221,.45);
    z-index:10;
    white-space:nowrap;
    transition:none;
  }

  /* monster body — centered in canvas */
  #monster-body {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:220px; height:220px;
  }

  /* dialog bubble after eating */
  #eat-bubble {
    display:none;
    text-align:center;
    font-family:'Nunito',sans-serif;
    font-size:14px;
    font-weight:700;
    color:#3C3489;
    line-height:1.7;
    padding: 0 .25rem .5rem;
  }

  #ok-btn {
    margin-top:10px;
    padding:.65rem 2rem;
    background:#534AB7;
    border:none; border-radius:12px;
    color:#fff; font-family:'Nunito',sans-serif;
    font-size:15px; font-weight:800;
    cursor:pointer; display:none;
    width:100%;
  }
  #ok-btn:hover { background:#3C3489; }

  /* rescue panel */
  .rescue-panel { background:#FAEEDA; border-radius:14px; padding:1rem 1.25rem; margin-bottom:1rem; }
  .rescue-title { font-size:13px; font-weight:800; color:#633806; margin-bottom:.5rem; }
  .rescue-item { font-size:14px; font-weight:700; color:#854F0B; padding:3px 0; }

  /* result */
  .result-screen { text-align:center; padding:2rem 1rem; animation:fade-in .4s ease; }
  @keyframes fade-in { from{opacity:0} to{opacity:1} }
  .result-trophy { font-size:72px; margin-bottom:1rem; }
  .result-title { font-size:24px; font-weight:800; color:var(--color-text-primary); margin-bottom:.5rem; }
  .result-sub { font-size:15px; color:var(--color-text-secondary); margin-bottom:1.5rem; }
  .rescue-summary { background:#FAEEDA; border-radius:14px; padding:1rem 1.25rem; margin-bottom:1.5rem; text-align:left; }
  .replay-btn { background:#534AB7; border:none; border-radius:12px; padding:.75rem 2rem; color:#fff; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; cursor:pointer; }
  .replay-btn:hover { background:#3C3489; }
</style>

let current=0, stars=3, wrongWords=[], pendingNext=false;
let monsterIdx=0;

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

function render(){
  const app=document.getElementById('app');
  const q=QUESTIONS[current];
  const shuffled=shuffle(q.choices);
  const pct=Math.round((current/QUESTIONS.length)*100);
  const starHtml=[1,2,3].map(i=>`<span class="star ${i<=stars?'lit':'dim'}">⭐</span>`).join('');
  const rescueHtml=wrongWords.length>0?`
    <div class="rescue-panel">
      <div class="rescue-title">⚔️ 拯救任务清单</div>
      ${wrongWords.map(w=>`<div class="rescue-item">🧡 ${w}</div>`).join('')}
    </div>`:''
  ;
  app.innerHTML=`
    <div class="phase-label">释义选词</div>
    <div class="progress-row">
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${current+1}/${QUESTIONS.length}</div>
      <div>${starHtml}</div>
    </div>
    ${rescueHtml}
    <div class="question-box"><p class="definition-text">${q.definition}</p></div>
    <div class="choices-grid" id="choices">
      ${shuffled.map(w=>`<button class="choice-btn" onclick="choose('${w}','${q.correct}')">${w}</button>`).join('')}
    </div>`;
}

function choose(selected,correct){
  if(pendingNext)return;
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correct)b.classList.add('correct');
    if(b.textContent.trim()===selected&&selected!==correct)b.classList.add('wrong');
  });
  if(selected===correct){
    pendingNext=true;
    setTimeout(nextQuestion,700);
  } else {
    if(stars>0)stars--;
    wrongWords.push(correct);
    pendingNext=true;
    setTimeout(()=>startEatScene(correct),400);
  }
}

// 每种怪兽嘴巴中心在 SVG viewBox(200×200) 中的坐标
// 动画时需要把这个坐标换算到 #eat-canvas 的像素坐标
const MOUTH_CENTER = [
  { x:100, y:158 },  // 毛毛 purple - mouth arc center ≈ y158
  { x:100, y:162 },  // 刺刺 green
  { x:100, y:156 },  // 橙橙 orange
  { x:100, y:162 },  // 粉粉 pink ghost
];

function startEatScene(word){
  monsterIdx=Math.floor(Math.random()*MONSTERS.length);
  const m=MONSTERS[monsterIdx];

  // set monster SVG
  document.getElementById('monster-body').innerHTML=m.body;

  // reset flying word to start position (top of canvas)
  const fw=document.getElementById('flying-word');
  fw.textContent=word;
  Object.assign(fw.style,{
    position:'absolute',
    top:'10px',
    left:'50%',
    transform:'translateX(-50%) scale(1)',
    opacity:'1',
    transition:'none',
    background:'linear-gradient(135deg,#7F77DD,#5DCAA5)',
    color:'#fff',
    borderRadius:'12px',
    padding:'8px 22px',
    fontSize:'22px',
    fontWeight:'800',
    boxShadow:'0 4px 18px rgba(127,119,221,.45)',
    zIndex:'10',
    whiteSpace:'nowrap',
  });

  // hide bubble & btn
  document.getElementById('eat-bubble').style.display='none';
  document.getElementById('ok-btn').style.display='none';

  // show stage
  document.getElementById('eat-stage').style.display='flex';

  // step 1: small entrance bounce on monster
  const body=document.getElementById('monster-body');
  body.style.transition='none';
  body.style.transform='translate(-50%,-50%) scale(0.7)';
  setTimeout(()=>{
    body.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1)';
    body.style.transform='translate(-50%,-50%) scale(1)';
  },30);

  // step 2: open mouth after monster appears
  setTimeout(()=>{
    openMouth(true);
    // word wobble hint
    fw.style.transition='transform .2s ease';
    fw.style.transform='translateX(-50%) rotate(-4deg) scale(1.05)';
    setTimeout(()=>{
      fw.style.transform='translateX(-50%) rotate(3deg) scale(1)';
      setTimeout(()=>flyWord(word),120);
    },180);
  },450);
}

function openMouth(open){
  const svg=document.getElementById('monster-body');
  const mc=svg.querySelector('#mouth-closed');
  const mo=svg.querySelector('#mouth-open');
  if(mc)mc.setAttribute('display',open?'none':'');
  if(mo)mo.setAttribute('display',open?'':'none');
}

function flyWord(word){
  const fw=document.getElementById('flying-word');
  const canvas=document.getElementById('eat-canvas');
  const monsterSvg=document.getElementById('monster-body');

  // 计算嘴巴在 canvas 中的像素位置
  // monster-body 是 220×220，居中在 canvas(280×280) 内
  // SVG viewBox 是 200×200，所以缩放比 = 220/200 = 1.1
  const svgScale=220/200;
  const monsterOffX=(280-220)/2; // 30px
  const monsterOffY=(280-220)/2; // 30px
  const mc=MOUTH_CENTER[monsterIdx];
  const mouthX=monsterOffX+mc.x*svgScale; // 嘴巴中心在canvas中的x像素
  const mouthY=monsterOffY+mc.y*svgScale; // 嘴巴中心在canvas中的y像素

  // flying-word 宽度一半，使其中心对准嘴巴
  const fwW=fw.offsetWidth;
  const targetLeft=mouthX-fwW/2;
  // 字的中心需到达 mouthY（top = mouthY - fw.offsetHeight/2）
  const fwH=fw.offsetHeight;
  const targetTop=mouthY-fwH/2;

  // 飞入动画：移动到嘴巴位置并缩小
  fw.style.transition=[
    'top 0.55s cubic-bezier(.55,0,.6,1)',
    'left 0.55s cubic-bezier(.55,0,.6,1)',
    'transform 0.55s cubic-bezier(.55,0,.6,1)',
    'opacity 0.45s ease 0.15s',
  ].join(',');
  fw.style.top=targetTop+'px';
  fw.style.left=targetLeft+'px';
  fw.style.transform='translateX(0) scale(0.15) rotate(8deg)';
  fw.style.opacity='0';

  setTimeout(()=>{
    // 合嘴
    openMouth(false);

    // 怪兽吞咽抖动
    const body=document.getElementById('monster-body');
    body.style.transition='transform .12s ease';
    body.style.transform='translate(-50%,-50%) scale(1.1) rotate(-3deg)';
    setTimeout(()=>{body.style.transform='translate(-50%,-50%) scale(0.95) rotate(2deg)';},120);
    setTimeout(()=>{body.style.transform='translate(-50%,-50%) scale(1.06)';},240);
    setTimeout(()=>{body.style.transform='translate(-50%,-50%) scale(0.98)';},360);
    setTimeout(()=>{body.style.transform='translate(-50%,-50%) scale(1)';},480);

    // 显示说明文字
    setTimeout(()=>{
      const m=MONSTERS[monsterIdx];
      const bubble=document.getElementById('eat-bubble');
      bubble.innerHTML=`😱 <b style="color:#D85A30">${word}</b> 被遗忘小怪兽 <b>${m.name}</b> 吃掉了！<br><span style="color:#854F0B;font-weight:700">加入拯救清单，等会儿去救它！🧡</span>`;
      bubble.style.display='block';
      bubble.style.opacity='0';
      bubble.style.transform='translateY(10px)';
      bubble.style.transition='opacity .3s, transform .3s';
      setTimeout(()=>{
        bubble.style.opacity='1';
        bubble.style.transform='translateY(0)';
      },30);
      document.getElementById('ok-btn').style.display='block';
    },520);
  },600);
}

function dismissEat(){
  document.getElementById('eat-stage').style.display='none';
  nextQuestion();
}

function nextQuestion(){
  pendingNext=false;
  current++;
  if(current>=QUESTIONS.length)showResult();
  else render();
}

function showResult(){
  const app=document.getElementById('app');
  const allRight=wrongWords.length===0;
  const starHtml=[1,2,3].map(i=>`<span class="star ${i<=stars?'lit':'dim'}" style="font-size:28px">⭐</span>`).join('');
  app.innerHTML=`
    <div class="result-screen">
      <div class="result-trophy">${allRight?'🏆':'⚔️'}</div>
      <div class="result-title">${allRight?'太厉害啦！全部答对！':'完成闯关！'}</div>
      <div style="display:flex;gap:4px;justify-content:center;margin-bottom:1rem">${starHtml}</div>
      <div class="result-sub">${allRight?'遗忘小怪兽一次都没得手，你真棒！':`有 ${wrongWords.length} 个单词被怪兽吃掉了，我们要去拯救它们！`}</div>
      ${wrongWords.length>0?`<div class="rescue-summary">
        <div class="rescue-title" style="font-size:14px;font-weight:800;color:#633806;margin-bottom:.6rem">⚔️ 待拯救的单词</div>
        ${wrongWords.map(w=>`<div class="rescue-item">🧡 ${w}</div>`).join('')}
      </div>`:''}
      <button class="replay-btn" onclick="restart()">🔄 再玩一次</button>
    </div>`;
}

function restart(){
  current=0; stars=3; wrongWords=[]; pendingNext=false;
  render();
}

render();
</script>
