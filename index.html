<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rosie 的学习乐园</title>
  <style>
    :root {
      --bg: #f0f4ff;
      --text: #1e293b;
      --sub: #64748b;
      --math-from: #3b82f6;
      --math-to: #6366f1;
      --eng-from: #10b981;
      --eng-to: #06b6d4;
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0 }

    body {
      min-height: 100vh;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: var(--bg);
    }

    /* ── 动态背景 ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,.08), transparent),
        radial-gradient(ellipse 70% 50% at 80% 85%, rgba(16,185,129,.08), transparent),
        radial-gradient(ellipse 50% 40% at 55% 40%, rgba(251,191,36,.06), transparent),
        linear-gradient(160deg, #eef3ff 0%, #f8fbff 40%, #ecfff7 70%, #fef9ec 100%);
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
      animation: orbFloat 18s ease-in-out infinite alternate;
    }
    .orb-1 { width: 320px; height: 320px; top: -60px; left: -80px; background: rgba(99,102,241,.12) }
    .orb-2 { width: 280px; height: 280px; bottom: -40px; right: -60px; background: rgba(16,185,129,.1); animation-delay: -6s; animation-duration: 22s }
    .orb-3 { width: 200px; height: 200px; top: 50%; left: 55%; background: rgba(251,191,36,.08); animation-delay: -12s; animation-duration: 25s }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1) }
      33% { transform: translate(30px, -20px) scale(1.05) }
      66% { transform: translate(-20px, 15px) scale(.95) }
      100% { transform: translate(10px, -10px) scale(1.02) }
    }

    /* ── 主容器 ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px 48px;
      gap: 36px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      max-width: 540px;
    }

    .hero-emoji {
      font-size: 52px;
      display: inline-block;
      animation: wave 2.5s ease-in-out infinite;
      transform-origin: 70% 70%;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg) }
      10% { transform: rotate(14deg) }
      20% { transform: rotate(-8deg) }
      30% { transform: rotate(14deg) }
      40% { transform: rotate(-4deg) }
      50%, 100% { transform: rotate(0deg) }
    }

    .hero-greeting {
      font-size: 15px;
      color: var(--sub);
      font-weight: 600;
      margin-top: 8px;
      letter-spacing: .02em;
    }

    .hero h1 {
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 900;
      line-height: 1.3;
      margin-top: 6px;
      background: linear-gradient(135deg, #1e293b 30%, #6366f1 60%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--sub);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* ── 卡片网格 ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 760px;
    }

    /* ── 模块卡片 ── */
    .card {
      position: relative;
      background: #fff;
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .28s ease;
      box-shadow: 0 4px 24px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04);
      border: 1px solid rgba(255,255,255,.8);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 20px 50px rgba(15,23,42,.1), 0 4px 12px rgba(15,23,42,.06);
    }

    /* 卡片顶部彩色条 */
    .card-accent {
      height: 5px;
      transition: height .28s ease;
    }
    .card:hover .card-accent { height: 6px }
    .card.math .card-accent { background: linear-gradient(90deg, var(--math-from), var(--math-to)) }
    .card.english .card-accent { background: linear-gradient(90deg, var(--eng-from), var(--eng-to)) }

    .card-body {
      padding: 24px 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* 图标区域 */
    .card-icon-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-icon {
      width: 54px; height: 54px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      transition: transform .3s ease;
    }
    .card:hover .card-icon { transform: scale(1.08) rotate(-4deg) }
    .card.math .card-icon { background: linear-gradient(135deg, #dbeafe, #e0e7ff) }
    .card.english .card-icon { background: linear-gradient(135deg, #d1fae5, #ccfbf1) }

    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .card.math .card-tag { color: #4338ca; background: #e0e7ff }
    .card.english .card-tag { color: #047857; background: #d1fae5 }

    .card-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 14px;
      color: var(--sub);
      line-height: 1.6;
    }

    /* 课程统计 */
    .card-stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .card-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      border-radius: 8px;
      padding: 4px 10px;
    }
    .card-stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .card.math .card-stat-dot { background: var(--math-from) }
    .card.english .card-stat-dot { background: var(--eng-from) }

    /* 进入按钮 */
    .card-enter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      transition: all .22s ease;
      gap: 8px;
    }
    .card.math .card-enter {
      background: linear-gradient(135deg, #eff6ff, #eef2ff);
      color: #4338ca;
    }
    .card.english .card-enter {
      background: linear-gradient(135deg, #ecfdf5, #ecfeff);
      color: #047857;
    }
    .card:hover.math .card-enter {
      background: linear-gradient(135deg, var(--math-from), var(--math-to));
      color: #fff;
    }
    .card:hover.english .card-enter {
      background: linear-gradient(135deg, var(--eng-from), var(--eng-to));
      color: #fff;
    }

    .enter-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      transition: transform .22s ease;
    }
    .card:hover .enter-arrow {
      transform: translateX(3px);
      background: rgba(255,255,255,.25);
    }

    /* 装饰圆 */
    .card-deco {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: .06;
      z-index: 0;
    }
    .card.math .card-deco { background: var(--math-from) }
    .card.english .card-deco { background: var(--eng-from) }
    .card-deco-1 { width: 120px; height: 120px; top: -30px; right: -20px }
    .card-deco-2 { width: 80px; height: 80px; bottom: -20px; left: -15px }

    /* ── 底部 ── */
    .footer {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      letter-spacing: .02em;
    }
    .footer-heart { color: #f43f5e; font-style: normal }

    /* ── 响应式 ── */
    @media (max-width: 680px) {
      .cards { grid-template-columns: 1fr; max-width: 400px }
      .page { padding: 24px 16px 36px; gap: 28px }
    }

    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f172a; --text: #f1f5f9; --sub: #94a3b8 }
      .bg-canvas {
        background:
          radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,.06), transparent),
          radial-gradient(ellipse 70% 50% at 80% 85%, rgba(16,185,129,.05), transparent),
          linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      }
      .orb-1 { background: rgba(99,102,241,.08) }
      .orb-2 { background: rgba(16,185,129,.06) }
      .orb-3 { background: rgba(251,191,36,.04) }
      .card {
        background: #1e293b;
        border-color: rgba(255,255,255,.06);
        box-shadow: 0 4px 24px rgba(0,0,0,.2);
      }
      .card:hover { box-shadow: 0 20px 50px rgba(0,0,0,.35) }
      .card.math .card-icon { background: linear-gradient(135deg, rgba(59,130,246,.15), rgba(99,102,241,.15)) }
      .card.english .card-icon { background: linear-gradient(135deg, rgba(16,185,129,.15), rgba(6,182,212,.15)) }
      .card.math .card-tag { background: rgba(99,102,241,.15); color: #818cf8 }
      .card.english .card-tag { background: rgba(16,185,129,.15); color: #34d399 }
      .card-stat { background: #0f172a; border-color: rgba(255,255,255,.06) }
      .card.math .card-enter { background: rgba(99,102,241,.1); color: #818cf8 }
      .card.english .card-enter { background: rgba(16,185,129,.1); color: #34d399 }
      .card-deco { opacity: .04 }
    }
  </style>
</head>
<body>
  <div class="bg-canvas"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="page">
    <section class="hero">
      <div class="hero-emoji">👋</div>
      <div class="hero-greeting" id="greeting"></div>
      <h1>Rosie 的学习乐园</h1>
      <p class="hero-sub">选一个模块开始今天的学习吧</p>
    </section>

    <section class="cards">
      <!-- 数学 -->
      <a class="card math" href="/math">
        <div class="card-accent"></div>
        <div class="card-deco card-deco-1"></div>
        <div class="card-deco card-deco-2"></div>
        <div class="card-body">
          <div class="card-icon-row">
            <div class="card-icon">🔢</div>
            <span class="card-tag">MATH</span>
          </div>
          <div class="card-info">
            <div class="card-title">数学乐园</div>
            <p class="card-desc">加减乘除、应用题、趣味动画，用故事理解数学。</p>
          </div>
          <div class="card-stats">
            <span class="card-stat"><span class="card-stat-dot"></span>乘法分配律</span>
            <span class="card-stat"><span class="card-stat-dot"></span>归一问题</span>
            <span class="card-stat"><span class="card-stat-dot"></span>动画演示</span>
          </div>
          <div class="card-enter">
            开始数学学习
            <span class="enter-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
              </svg>
            </span>
          </div>
        </div>
      </a>

      <!-- 英语 -->
      <a class="card english" href="/english/words">
        <div class="card-accent"></div>
        <div class="card-deco card-deco-1"></div>
        <div class="card-deco card-deco-2"></div>
        <div class="card-body">
          <div class="card-icon-row">
            <div class="card-icon">📖</div>
            <span class="card-tag">ENGLISH</span>
          </div>
          <div class="card-info">
            <div class="card-title">英语天地</div>
            <p class="card-desc">背单词、拼写练习、沉浸模式，轻松记住每个单词。</p>
          </div>
          <div class="card-stats">
            <span class="card-stat"><span class="card-stat-dot"></span>单词卡片</span>
            <span class="card-stat"><span class="card-stat-dot"></span>拼写练习</span>
            <span class="card-stat"><span class="card-stat-dot"></span>每日一练</span>
          </div>
          <div class="card-enter">
            开始英语学习
            <span class="enter-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
              </svg>
            </span>
          </div>
        </div>
      </a>
    </section>

    <div class="footer">Made with <em class="footer-heart">♥</em> for Rosie</div>
  </div>

  <script>
    const h = new Date().getHours();
    const g = h < 6 ? '夜深了，早点休息哦 🌙'
            : h < 11 ? '早上好，新的一天开始啦 ☀️'
            : h < 14 ? '中午好，吃饱了再学习 🍚'
            : h < 18 ? '下午好，继续加油 💪'
            : '晚上好，今天学到了什么呢 🌟';
    document.getElementById('greeting').textContent = g;
  </script>
</body>
</html>
