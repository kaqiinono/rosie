<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>WordMaster Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-title" content="WordMaster">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--surface3:#0f3460;
  --accent:#e94560;--accent2:#f5a623;--accent3:#4ade80;--accent4:#60a5fa;
  --text:#f0f0ff;--text-dim:#9090b0;--border:rgba(255,255,255,.08);--radius:16px;
  --ph-vowel:#ff6b6b;--ph-long:#f1948a;--ph-digraph:#45b7d1;--ph-cluster:#4ecdc4;
  --ph-blend:#f0b27a;--ph-r:#bb8fce;--ph-magic:#f7dc6f;--ph-suffix:#82e0aa;
  --ph-silent:#888;--ph-plain:#f0f0ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 25%,rgba(233,69,96,.07) 0,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(96,165,250,.07) 0,transparent 55%);pointer-events:none;z-index:0;}

/* ===== HEADER ===== */
.app-header{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 16px;}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.app-logo{font-family:'Fredoka One',cursive;font-size:1.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.nav-tabs{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:12px;border:1px solid var(--border);}
.nav-tab{padding:7px 14px;border:none;border-radius:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;transition:all .2s;background:transparent;color:var(--text-dim);}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),#c0392b);color:#fff;box-shadow:0 3px 10px rgba(233,69,96,.35);}
.nav-tab:hover:not(.active){background:var(--surface2);color:var(--text);}

/* ===== FILTER BAR — MULTI-SELECT ===== */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;}
.filter-inner{max-width:1280px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}
.filter-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:8px;}
.filter-label{font-size:.7rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;padding-top:7px;min-width:62px;}
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;user-select:none;white-space:nowrap;}
.chip:hover{border-color:var(--accent4);color:var(--text);}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(233,69,96,.3);}
.chip.unit-chip.active{background:linear-gradient(135deg,var(--accent),#c0392b);}
.chip.lesson-chip.active{background:linear-gradient(135deg,var(--accent4),#3b82f6);}
.chip.word-chip.active{background:linear-gradient(135deg,var(--accent2),#e67e22);}
.filter-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px;}
.word-count-badge{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:5px 10px;border-radius:20px;font-size:.78rem;font-weight:700;}
.flip-all-btn{padding:7px 16px;background:linear-gradient(135deg,var(--accent4),#3b82f6);border:none;border-radius:8px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.flip-all-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(96,165,250,.4);}
.clear-btn{padding:5px 12px;background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .18s;}
.clear-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-divider{width:1px;height:22px;background:var(--border);}

/* ===== MAIN ===== */
.main-content{max-width:1280px;margin:0 auto;padding:18px 16px;position:relative;z-index:1;}

/* ===== LEGEND ===== */
.phonics-legend{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;}
.legend-title{font-size:.68rem;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.legend-items{display:flex;flex-wrap:wrap;gap:6px 12px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.7rem;font-weight:700;}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ===== CARDS GRID ===== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

/* ===== FLASHCARD ===== */
.card-wrapper{perspective:1000px;min-height:240px;}
.card-inner{width:100%;min-height:240px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.card-wrapper.flipped .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:var(--radius);backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);overflow:hidden;}

/* Card Front */
.card-front{background:linear-gradient(135deg,#1e1e35 0%,#161628 100%);padding:15px;display:flex;flex-direction:column;gap:6px;}
.card-front::before{content:'';position:absolute;top:0;right:0;width:90px;height:90px;background:radial-gradient(circle at top right,rgba(233,69,96,.1),transparent 70%);border-radius:0 var(--radius) 0 100%;}
.card-meta{display:flex;gap:4px;flex-wrap:wrap;}
.card-tag{padding:2px 7px;border-radius:20px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
.tag-unit{background:rgba(233,69,96,.2);color:var(--accent);border:1px solid rgba(233,69,96,.3);}
.tag-lesson{background:rgba(96,165,250,.2);color:var(--accent4);border:1px solid rgba(96,165,250,.3);}
.card-word-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:4px 0;}
.card-word{font-family:'Nunito',sans-serif;font-size:1.85rem;font-weight:900;line-height:1.2;text-align:center;word-break:break-word;}
.card-word.is-phrase{font-size:1.3rem;}
.card-word.is-long{font-size:1.05rem;}
.card-ipa{font-size:.85rem;color:var(--accent2);font-style:italic;font-weight:600;text-align:center;letter-spacing:.03em;opacity:.9;}
.card-preview{font-size:.72rem;color:var(--text-dim);line-height:1.5;border-top:1px solid var(--border);padding-top:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.flip-hint{position:absolute;bottom:6px;right:9px;font-size:.58rem;color:rgba(255,255,255,.18);font-weight:700;}

/* Card Back */
.card-back{background:linear-gradient(135deg,#0f3460 0%,#1a1a2e 100%);padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotateY(180deg);gap:10px;min-height:240px;}
.card-back-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--accent4);opacity:.7;align-self:flex-start;}
.card-expl{font-size:1.05rem;font-weight:700;text-align:center;line-height:1.6;color:var(--text);}
.card-echo{font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;color:rgba(255,255,255,.3);text-align:center;margin-top:4px;}
.card-ipa-back{font-size:.8rem;color:var(--accent2);font-style:italic;opacity:.7;}

/* ===== PHONICS ===== */
.ph-vowel{color:var(--ph-vowel);font-weight:900;}
.ph-long{color:var(--ph-long);font-weight:900;}
.ph-digraph{color:var(--ph-digraph);font-weight:900;}
.ph-cluster{color:var(--ph-cluster);font-weight:900;}
.ph-blend{color:var(--ph-blend);font-weight:900;}
.ph-r{color:var(--ph-r);font-weight:900;}
.ph-magic{color:var(--ph-magic);font-weight:900;}
.ph-suffix{color:var(--ph-suffix);font-weight:900;}
.ph-silent{color:var(--ph-silent);font-weight:900;opacity:.65;}
.ph-plain{color:var(--ph-plain);}
.syllable-dot{color:rgba(255,255,255,.28);font-size:.42em;vertical-align:middle;margin:0 1px;font-weight:900;}
.magic-e-wrap{position:relative;display:inline-flex;align-items:flex-end;padding-top:12px;}
.magic-arc{position:absolute;top:0;left:0;width:100%;height:12px;pointer-events:none;overflow:visible;}

/* ===== KEYWORD HIGHLIGHTS ===== */
/* Keyword highlights: red=core concept, gold=key state, blue=category */
.kw-red{color:#ff6b8a;font-weight:900;letter-spacing:.01em;}
.kw-gold{color:#ffd166;font-weight:900;letter-spacing:.01em;}
.kw-blue{color:#74c2f7;font-weight:900;letter-spacing:.01em;}

/* ===== PRACTICE ===== */
.practice-setup{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
.practice-setup h2{font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--accent2);margin-bottom:14px;}
.setup-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;}
.setup-label{font-size:.78rem;font-weight:700;color:var(--text-dim);min-width:60px;}
.type-group{display:flex;flex-wrap:wrap;gap:7px;}
.type-lbl{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:700;transition:all .2s;user-select:none;}
.type-lbl input{display:none;}
.type-lbl.sel{border-color:var(--accent);background:rgba(233,69,96,.15);color:var(--accent);}
.start-btn{padding:11px 26px;background:linear-gradient(135deg,var(--accent),#c0392b);border:none;border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(233,69,96,.35);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(233,69,96,.5);}

/* Quiz */
.quiz-container{display:none;max-width:680px;margin:0 auto;}
.quiz-prog{margin-bottom:18px;}
.quiz-prog-bg{height:6px;background:var(--surface);border-radius:3px;overflow:hidden;margin-bottom:7px;}
.quiz-prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s ease;}
.quiz-prog-row{display:flex;justify-content:space-between;font-size:.78rem;font-weight:700;color:var(--text-dim);}
.score-badge{background:rgba(74,222,128,.15);color:var(--accent3);border:1px solid rgba(74,222,128,.3);padding:2px 9px;border-radius:20px;font-size:.78rem;font-weight:800;}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:12px;}
.q-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.qa{background:rgba(233,69,96,.2);color:var(--accent);border:1px solid rgba(233,69,96,.3);}
.qb{background:rgba(96,165,250,.2);color:var(--accent4);border:1px solid rgba(96,165,250,.3);}
.qc{background:rgba(245,166,35,.2);color:var(--accent2);border:1px solid rgba(245,166,35,.3);}
.quiz-q{font-size:1.2rem;font-weight:900;line-height:1.4;margin-bottom:4px;}
.quiz-sub{font-size:.8rem;color:var(--text-dim);margin-bottom:14px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt-btn{padding:11px 12px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:.83rem;cursor:pointer;transition:all .18s;text-align:left;line-height:1.4;word-break:break-word;}
.opt-btn:hover:not(:disabled){border-color:var(--accent4);background:rgba(96,165,250,.1);}
.opt-btn.correct{border-color:var(--accent3)!important;background:rgba(74,222,128,.15)!important;color:var(--accent3)!important;}
.opt-btn.wrong{border-color:var(--accent)!important;background:rgba(233,69,96,.15)!important;color:var(--accent)!important;}
.opt-btn:disabled{cursor:default;}
.spell-wrap{display:flex;flex-direction:column;gap:9px;}
.spell-input{width:100%;padding:13px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:1.25rem;font-weight:700;text-align:center;letter-spacing:.06em;outline:none;transition:border-color .2s;}
.spell-input:focus{border-color:var(--accent2);}
.spell-input.correct{border-color:var(--accent3);background:rgba(74,222,128,.1);}
.spell-input.wrong{border-color:var(--accent);background:rgba(233,69,96,.1);}
.submit-btn{padding:11px;background:linear-gradient(135deg,var(--accent2),#e67e22);border:none;border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer;transition:all .18s;}
.submit-btn:hover{transform:translateY(-1px);}
.feedback{text-align:center;font-size:.85rem;font-weight:700;padding:8px;border-radius:8px;margin-top:4px;}
.fb-ok{background:rgba(74,222,128,.15);color:var(--accent3);}
.fb-err{background:rgba(233,69,96,.15);color:var(--accent);}
.next-btn{width:100%;padding:12px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .18s;display:none;align-items:center;justify-content:center;gap:5px;}
.next-btn:hover{border-color:var(--accent4);background:rgba(96,165,250,.1);}
.quiz-results{display:none;text-align:center;padding:40px 16px;}
.res-emoji{font-size:3.5rem;margin-bottom:12px;}
.res-score{font-family:'Fredoka One',cursive;font-size:3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.res-text{color:var(--text-dim);font-size:.92rem;margin-bottom:20px;}
.retry-btn{padding:11px 26px;background:linear-gradient(135deg,var(--accent),#c0392b);border:none;border-radius:10px;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;}
.empty-state{text-align:center;padding:50px 16px;color:var(--text-dim);grid-column:1/-1;}

@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr;}
  .card-word{font-size:1.6rem;}
  .card-word.is-phrase{font-size:1.1rem;}
  .card-word.is-long{font-size:.9rem;}
  .opts-grid{grid-template-columns:1fr;}
  .header-inner{flex-wrap:wrap;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-wrapper{animation:fadeUp .28s ease backwards;}
.card-wrapper:nth-child(2){animation-delay:.04s}
.card-wrapper:nth-child(3){animation-delay:.07s}
.card-wrapper:nth-child(4){animation-delay:.1s}
.card-wrapper:nth-child(5){animation-delay:.13s}
.card-wrapper:nth-child(6){animation-delay:.16s}
.card-wrapper:nth-child(7){animation-delay:.19s}
.card-wrapper:nth-child(8){animation-delay:.22s}
.card-wrapper:nth-child(n+9){animation-delay:.25s}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="app-logo">📚 WordMaster Pro</div>
    <nav class="nav-tabs">
      <button class="nav-tab active" onclick="switchModule('vocab')">🃏 背单词</button>
      <button class="nav-tab" onclick="switchModule('practice')">✏️ 单词练习</button>
    </nav>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <div class="filter-inner">
    <!-- Unit chips -->
    <div class="filter-row">
      <span class="filter-label">Unit</span>
      <div class="chips-wrap" id="unit-chips"></div>
    </div>
    <!-- Lesson chips -->
    <div class="filter-row">
      <span class="filter-label">Lesson</span>
      <div class="chips-wrap" id="lesson-chips"></div>
    </div>
    <!-- Word chips -->
    <div class="filter-row">
      <span class="filter-label">单词</span>
      <div class="chips-wrap" id="word-chips"></div>
    </div>
    <!-- Actions -->
    <div class="filter-actions">
      <span class="word-count-badge" id="word-count">0 词</span>
      <button class="clear-btn" onclick="clearWordSel()">清除单词筛选</button>
      <div class="filter-divider"></div>
      <button class="flip-all-btn" id="flip-all-btn" onclick="flipAll()">🔄 全部翻面</button>
    </div>
  </div>
</div>

<!-- VOCAB MODULE -->
<div id="vocab-module">
  <div class="main-content">
    <div class="phonics-legend">
      <div class="legend-title">🎨 自然拼读颜色图例（单词级别生效）</div>
      <div class="legend-items">
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-vowel)"></div><span class="ph-vowel">短元音</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-long)"></div><span class="ph-long">长元音</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-digraph)"></div><span class="ph-digraph">元音组合</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-cluster)"></div><span class="ph-cluster">辅音组合</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-blend)"></div><span class="ph-blend">辅音丛</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-r)"></div><span class="ph-r">R控元音</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-magic)"></div><span class="ph-magic">魔力E</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-suffix)"></div><span class="ph-suffix">特殊后缀</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--ph-silent)"></div><span class="ph-silent">静音字母</span></div>
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</div>

<!-- PRACTICE MODULE -->
<div id="practice-module" style="display:none">
  <div class="main-content">
    <div class="practice-setup" id="practice-setup">
      <h2>🎯 练习设置</h2>
      <div class="setup-row">
        <span class="setup-label">题型</span>
        <div class="type-group">
          <label class="type-lbl sel" id="lbl-a"><input type="checkbox" id="cb-a" checked>A. 释义→选单词</label>
          <label class="type-lbl sel" id="lbl-b"><input type="checkbox" id="cb-b" checked>B. 单词→选释义</label>
          <label class="type-lbl" id="lbl-c"><input type="checkbox" id="cb-c">C. 释义→默写</label>
        </div>
      </div>
      <div class="setup-row">
        <span style="font-size:.78rem;color:var(--text-dim)">范围：<span id="scope-lbl" style="color:var(--accent2);font-weight:800"></span></span>
      </div>
      <button class="start-btn" onclick="startPractice()">🚀 开始练习</button>
    </div>
    <div class="quiz-container" id="quiz-container">
      <div class="quiz-prog">
        <div class="quiz-prog-bg"><div class="quiz-prog-bar" id="prog-bar" style="width:0%"></div></div>
        <div class="quiz-prog-row">
          <span id="prog-text">第 1 / 1 题</span>
          <span class="score-badge" id="score-badge">✓ 0</span>
        </div>
      </div>
      <div class="quiz-card">
        <div id="q-badge" class="q-badge qa">题型 A</div>
        <div class="quiz-q" id="quiz-q"></div>
        <div class="quiz-sub" id="quiz-sub"></div>
        <div class="opts-grid" id="opts-grid"></div>
        <div class="spell-wrap" id="spell-wrap" style="display:none">
          <input type="text" class="spell-input" id="spell-input" placeholder="请输入单词或短语…" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="submit-btn" id="submit-btn" onclick="checkSpell()">✓ 确认</button>
          <div class="feedback" id="spell-fb" style="display:none"></div>
        </div>

function hasMagicE(w){return /[bcdfghjklmnpqrstvwxyz][aeiou][bcdfghjklmnpqrstvwxyz]+e$/i.test(w);}
function magicEPos(w){
  const m=w.match(/([bcdfghjklmnpqrstvwxyz])([aeiou])([bcdfghjklmnpqrstvwxyz]+)(e)$/i);

}

        let free=true;
        for(let j=i;j<i+r.p.length;j++)if(cls[j]!==null){free=false;break;}
        if(free)for(let j=i;j<i+r.p.length;j++)cls[j]=r.c;
        i+=r.p.length;
      }else i++;
    }
  }
  for(let i=0;i<len;i++)if(cls[i]===null)cls[i]=/[aeiou]/i.test(lo[i])?'ph-vowel':'ph-plain';

  const chars=[];
  for(const s of segs)for(const ch of s.t)chars.push({ch,c:s.c});
  if(me){chars[me.vi].c='ph-magic';chars[me.ei].c='ph-magic';}
  const bounds=new Set();
  if(sylls&&sylls.length>1){let p=0;for(let i=0;i<sylls.length-1;i++){p+=sylls[i].length;bounds.add(p);}}

    let html='';let inW=false;
    for(let i=0;i<chars.length;i++){
      if(bounds.has(i))html+='<span class="syllable-dot">·</span>';
      if(i===me.vi){html+='<span class="magic-e-wrap">';inW=true;}

    }
    return html;
  }
  let html='';
  for(let i=0;i<chars.length;i++){
    if(bounds.has(i))html+='<span class="syllable-dot">·</span>';
    html+=`<span class="${chars[i].c}">${chars[i].ch}</span>`;

}
function buildPhonics(text){
  const words=text.trim().split(/\s+/);

  }

    return(clean.length>=2?renderSingleWord(clean):`<span class="ph-plain">${w}</span>`);

}

function hilite(text, word) {
  const pairs = word ? (KW_MAP[word] || []) : [];
  if (!pairs.length) return escHtml(text);

  // Sort by phrase length descending to match longer phrases first
  const sorted = [...pairs].sort((a, b) => b[0].length - a[0].length);

  // Find all non-overlapping matches in original text
  const matches = []; // {start, end, phrase, cls}
  for (const [phrase, cls] of sorted) {
    const lo = text.toLowerCase();
    const ph = phrase.toLowerCase();
    let idx = 0;
    while ((idx = lo.indexOf(ph, idx)) !== -1) {
      const end = idx + phrase.length;
      // Check no overlap with existing matches
      const overlap = matches.some(m => idx < m.end && end > m.start);
      if (!overlap) matches.push({start: idx, end, cls});
      idx = end;
    }
  }

  if (!matches.length) return escHtml(text);

  // Sort matches by position
  matches.sort((a, b) => a.start - b.start);

  // Build output: escape plain segments, wrap matched segments in spans
  let result = '', last = 0;
  for (const m of matches) {
    result += escHtml(text.slice(last, m.start));
    result += `<span class="${m.cls}">${escHtml(text.slice(m.start, m.end))}</span>`;
    last = m.end;
  }
  result += escHtml(text.slice(last));
  return result;
}

function getAllUnits(){return[...new Set(VOCAB.map(v=>v.unit))].sort();}
function getAllLessons(units){
  const src=units.size?VOCAB.filter(v=>units.has(v.unit)):VOCAB;
  return[...new Set(src.map(v=>v.lesson))].sort();
}
function getFiltered(){
  return VOCAB.filter(v=>{
    if(selUnits.size&&!selUnits.has(v.unit))return false;
    if(selLessons.size&&!selLessons.has(v.lesson))return false;
    if(selWords.size&&!selWords.has(v.word))return false;
    return true;
  });
}

function initFilters(){
  // Default: Unit 1, Lesson 1
  selUnits.add('Unit 1');
  selLessons.add('Lesson 1');
  buildUnitChips();
  buildLessonChips();
  buildWordChips();
  renderCards();
}

function buildUnitChips(){
  const wrap=document.getElementById('unit-chips');
  const all=getAllUnits();
  wrap.innerHTML=all.map((u,i)=>`<span class="chip unit-chip${selUnits.has(u)?' active':''}" data-type="unit" data-idx="${i}">${u}</span>`).join('');
}

function buildLessonChips(){
  const wrap=document.getElementById('lesson-chips');
  const all=getAllLessons(selUnits);
  wrap.innerHTML=all.map((l,i)=>`<span class="chip lesson-chip${selLessons.has(l)?' active':''}" data-type="lesson" data-idx="${i}">${l}</span>`).join('');
}

function buildWordChips(){
  const wrap=document.getElementById('word-chips');
  const base=VOCAB.filter(v=>{
    if(selUnits.size&&!selUnits.has(v.unit))return false;
    if(selLessons.size&&!selLessons.has(v.lesson))return false;
    return true;
  });
  // Store word list for lookup by index
  wrap._words=base.map(v=>v.word);
  wrap.innerHTML=base.map((v,i)=>`<span class="chip word-chip${selWords.has(v.word)?' active':''}" data-type="word" data-idx="${i}">${v.word}</span>`).join('');
}

// Event delegation for all chips
document.addEventListener('click',function(e){
  const chip=e.target.closest('[data-type]');
  if(!chip)return;
  const type=chip.dataset.type;
  const idx=parseInt(chip.dataset.idx);
  if(type==='unit'){
    const u=getAllUnits()[idx];
    if(!u)return;
    selUnits.has(u)?selUnits.delete(u):selUnits.add(u);
    const validLessons=new Set(getAllLessons(selUnits));
    selLessons=new Set([...selLessons].filter(l=>validLessons.has(l)));
    selWords.clear();
    buildUnitChips();buildLessonChips();buildWordChips();renderCards();
  }else if(type==='lesson'){
    const l=getAllLessons(selUnits)[idx];
    if(!l)return;
    selLessons.has(l)?selLessons.delete(l):selLessons.add(l);
    selWords.clear();
    buildLessonChips();buildWordChips();renderCards();
  }else if(type==='word'){
    const wrap=document.getElementById('word-chips');
    const w=wrap._words&&wrap._words[idx];
    if(!w)return;
    selWords.has(w)?selWords.delete(w):selWords.add(w);
    buildWordChips();renderCards();
  }
});

function escAttr(s){return s.replace(/'/g,"&apos;").replace(/"/g,'&quot;');}




function clearWordSel(){selWords.clear();buildWordChips();renderCards();}

// ============================================================
//  RENDER CARDS
// ============================================================
let allFlipped=false;
function renderCards(){
  allFlipped=false;
  document.getElementById('flip-all-btn').textContent='🔄 全部翻面';
  const words=getFiltered();
  document.getElementById('word-count').textContent=words.length+' 词';
  const grid=document.getElementById('cards-grid');
  if(!words.length){
    grid.innerHTML='<div class="empty-state"><div style="font-size:2.5rem;margin-bottom:10px">🔍</div><div>没有找到匹配的单词<br><small style="font-size:.8rem;opacity:.6">请选择 Unit 或 Lesson</small></div></div>';
    return;
  }
  grid.innerHTML=words.map((v,i)=>makeCard(v,i)).join('');
}

function makeCard(v,i){
  const parts=v.word.trim().split(/\s+/);
  const len=v.word.length;
  let sz='';
  if(parts.length>3||len>20)sz='is-long';
  else if(parts.length>1||len>10)sz='is-phrase';
  const ph=buildPhonics(v.word);
  const ex=hilite(v.explanation, v.word);
  const ipa=v.ipa||'';
  return`<div class="card-wrapper" id="cw-${i}" onclick="flipCard(${i})">
<div class="card-inner">
  <div class="card-face card-front">
    <div class="card-meta">
      <span class="card-tag tag-unit">${v.unit}</span>
      <span class="card-tag tag-lesson">${v.lesson}</span>
    </div>
    <div class="card-word-area">
      <div class="card-word ${sz}">${ph}</div>
      ${ipa?`<div class="card-ipa">${ipa}</div>`:''}
    </div>
    <div class="card-preview">${escHtml(v.explanation)}</div>
    <span class="flip-hint">点击翻面</span>
  </div>
  <div class="card-face card-back">
    <span class="card-back-lbl">释义</span>
    <div class="card-expl">${ex}</div>

    <span class="flip-hint">点击翻回</span>
  </div>
</div>
</div>`;
}

function flipCard(i){document.getElementById('cw-'+i)?.classList.toggle('flipped');}
function flipAll(){
  allFlipped=!allFlipped;
  const words=getFiltered();
  words.forEach((_,i)=>{const c=document.getElementById('cw-'+i);if(c)c.classList.toggle('flipped',allFlipped);});
  document.getElementById('flip-all-btn').textContent=allFlipped?'🔄 全部翻回':'🔄 全部翻面';
}

// ============================================================
//  MODULE SWITCH
// ============================================================
function switchModule(mod){
  const isV=mod==='vocab';
  document.getElementById('vocab-module').style.display=isV?'block':'none';
  document.getElementById('practice-module').style.display=isV?'none':'block';
  document.getElementById('flip-all-btn').style.display=isV?'flex':'none';
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',isV?i===0:i===1));
  if(!isV){updateScopeLbl();showSetup();}
}
function updateScopeLbl(){
  const w=getFiltered();
  const units=selUnits.size?[...selUnits].join(', '):'全部Unit';
  const lessons=selLessons.size?[...selLessons].join(', '):'全部Lesson';
  document.getElementById('scope-lbl').textContent=`${units} / ${lessons}（${w.length}词）`;
}

// checkbox style
['a','b','c'].forEach(t=>{
  const cb=document.getElementById('cb-'+t),lb=document.getElementById('lbl-'+t);
  if(cb&&lb)cb.addEventListener('change',()=>lb.classList.toggle('sel',cb.checked));

// ============================================================
//  PRACTICE MODULE
// ============================================================
let quizQs=[],curQ=0,score=0,answered=false;
function showSetup(){
  document.getElementById('practice-setup').style.display='block';
  document.getElementById('quiz-container').style.display='none';
  document.getElementById('quiz-results').style.display='none';
}
function rng(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/0x100000000;};}
function shuffle(arr,seed){
  const a=[...arr],r=rng(seed||Date.now());
  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function getTypes(){const t=[];if(document.getElementById('cb-a').checked)t.push('A');if(document.getElementById('cb-b').checked)t.push('B');if(document.getElementById('cb-c').checked)t.push('C');return t;}
function startPractice(){
  const words=getFiltered(),types=getTypes();
  if(!words.length){alert('请先选择单词范围！');return;}
  if(!types.length){alert('请至少选一种题型！');return;}
  const seed=Date.now();
  const shuffled=shuffle(words,seed);
  quizQs=shuffled.map((w,i)=>({word:w,type:types[i%types.length]}));
  quizQs=shuffle(quizQs,seed+1);
  curQ=0;score=0;answered=false;
  document.getElementById('practice-setup').style.display='none';
  document.getElementById('quiz-container').style.display='block';
  document.getElementById('quiz-results').style.display='none';
  renderQ();
}
function renderQ(){
  if(curQ>=quizQs.length){showResults();return;}
  answered=false;
  const q=quizQs[curQ],total=quizQs.length;
  document.getElementById('prog-bar').style.width=(curQ/total*100)+'%';
  document.getElementById('prog-text').textContent=`第 ${curQ+1} / ${total} 题`;
  document.getElementById('score-badge').textContent='✓ '+score;
  document.getElementById('opts-grid').style.display='none';
  document.getElementById('spell-wrap').style.display='none';
  document.getElementById('next-btn').style.display='none';
  const pool=getFiltered();
  let dPool=pool.filter(v=>v.lesson===q.word.lesson&&v.word!==q.word.word);
  if(dPool.length<3)dPool=pool.filter(v=>v.word!==q.word.word);
  const badge=document.getElementById('q-badge');
  const qq=document.getElementById('quiz-q');
  const sub=document.getElementById('quiz-sub');
  if(q.type==='A'){
    badge.textContent='题型 A：看释义 → 选单词';badge.className='q-badge qa';
    qq.textContent=q.word.explanation;sub.textContent='请选出对应的英文单词或短语：';
    const opts=shuffle([q.word,...shuffle(dPool,Date.now()+curQ).slice(0,3)],Date.now()+curQ+10);
    const g=document.getElementById('opts-grid');g.style.display='grid';
    g.innerHTML=opts.map(o=>`<button class="opt-btn" data-val="${o.word.replace(/"/g,'&quot;')}" onclick="checkMC(this,'${o.word.replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${q.word.word.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">${o.word}</button>`).join('');
  }else if(q.type==='B'){
    badge.textContent='题型 B：看单词 → 选释义';badge.className='q-badge qb';
    qq.innerHTML=buildPhonics(q.word.word)+(q.word.ipa?`<div style="font-size:.85rem;color:var(--accent2);font-style:italic;font-weight:600;margin-top:4px">${q.word.ipa}</div>`:'');
    sub.textContent='请选出正确的释义：';
    const opts=shuffle([q.word,...shuffle(dPool,Date.now()+curQ).slice(0,3)],Date.now()+curQ+10);
    const g=document.getElementById('opts-grid');g.style.display='grid';
    g.innerHTML=opts.map(o=>`<button class="opt-btn" onclick="checkMC(this,'${o.word.replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${q.word.word.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">${escHtml(o.explanation)}</button>`).join('');
  }else{
    badge.textContent='题型 C：看释义 → 默写单词';badge.className='q-badge qc';
    qq.textContent=q.word.explanation;sub.textContent='请拼写出对应的英文单词或短语：';
    const sw=document.getElementById('spell-wrap');sw.style.display='flex';
    const si=document.getElementById('spell-input');
    si.value='';si.className='spell-input';
    document.getElementById('spell-fb').style.display='none';
    document.getElementById('submit-btn').style.display='block';
    si.onkeydown=e=>{if(e.key==='Enter'&&!answered)checkSpell();};
    setTimeout(()=>si.focus(),80);
  }
}
function checkMC(btn,chosen,correct){
  if(answered)return;answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('correct');score++;document.getElementById('score-badge').textContent='✓ '+score;}
  else{
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.getAttribute('data-val')===correct||b.textContent.trim()===correct)b.classList.add('correct');});
  }
  document.getElementById('next-btn').style.display='flex';
}
function checkSpell(){
  if(answered)return;
  const si=document.getElementById('spell-input');
  const ans=si.value.trim().toLowerCase();
  const correct=quizQs[curQ].word.word.toLowerCase();
  const fb=document.getElementById('spell-fb');
  answered=true;document.getElementById('submit-btn').style.display='none';
  if(ans===correct){si.classList.add('correct');score++;document.getElementById('score-badge').textContent='✓ '+score;fb.textContent='✓ 正确！🎉';fb.className='feedback fb-ok';}
  else{si.classList.add('wrong');fb.innerHTML=`✗ 错误，正确答案：<strong>${quizQs[curQ].word.word}</strong>`;fb.className='feedback fb-err';}
  fb.style.display='block';document.getElementById('next-btn').style.display='flex';
}
function nextQ(){curQ++;renderQ();}
function showResults(){
  document.getElementById('quiz-container').style.display='none';
  document.getElementById('quiz-results').style.display='block';
  const total=quizQs.length,pct=Math.round(score/total*100);
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'😅';
  const msg=pct>=90?'太棒了，几乎满分！':pct>=70?'不错哦，继续加油！':pct>=50?'有进步，再练练吧！':'继续努力，你可以的！';
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-score').textContent=score+' / '+total;
  document.getElementById('res-text').textContent=`正确率 ${pct}%　${msg}`;
}
function retryPractice(){showSetup();}
