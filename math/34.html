<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>买苹果学乘法 · 乘法分配律</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden}
    body{
      font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
      background:linear-gradient(170deg,#e0f2fe 0%,#fef9c3 35%,#fce7f3 70%,#e0f2fe 100%);
      background-size:400% 400%;
      animation:bgShift 20s ease infinite;
      color:#1e293b;
    }
    @keyframes bgShift{
      0%,100%{background-position:0% 50%}
      50%{background-position:100% 50%}
    }

    .app{
      max-width:900px;margin:0 auto;padding:20px 16px 40px;
      min-height:100vh;display:flex;flex-direction:column;gap:18px;
    }

    /* ── 标题 ── */
    .hero{
      text-align:center;padding:18px 12px 14px;
      background:rgba(255,255,255,.85);border-radius:20px;
      box-shadow:0 8px 32px rgba(0,0,0,.08);
      border:2px solid rgba(255,255,255,.6);
    }
    .hero h1{font-size:26px;color:#dc2626;margin-bottom:4px}
    .hero p{font-size:14px;color:#64748b}

    /* ── 故事对话框 ── */
    .story-box{
      background:rgba(255,255,255,.92);border-radius:18px;
      padding:16px 20px;box-shadow:0 4px 20px rgba(0,0,0,.06);
      border:2px solid #fbbf24;position:relative;
      min-height:70px;display:flex;align-items:center;gap:14px;
    }
    .story-avatar{
      width:56px;height:56px;border-radius:50%;
      background:linear-gradient(135deg,#fbbf24,#f97316);
      display:flex;align-items:center;justify-content:center;
      font-size:30px;flex-shrink:0;
      box-shadow:0 4px 12px rgba(251,191,36,.4);
    }
    .story-text{font-size:17px;line-height:1.7;flex:1}
    .story-text strong{color:#dc2626}
    .story-text .price{
      display:inline-block;background:#fef3c7;border:1px solid #fbbf24;
      border-radius:8px;padding:1px 7px;font-weight:700;color:#92400e;
    }

    /* ── 舞台区 ── */
    .stage{
      background:rgba(255,255,255,.88);border-radius:20px;
      padding:20px;box-shadow:0 6px 28px rgba(0,0,0,.07);
      border:2px solid rgba(255,255,255,.5);
      position:relative;overflow:hidden;
      min-height:320px;
    }
    .stage-label{
      font-size:13px;color:#94a3b8;text-align:center;margin-bottom:10px;
    }

    /* 货架 */
    .shelf{
      display:flex;justify-content:center;gap:40px;
      flex-wrap:wrap;padding:10px 0;
    }
    .shelf-group{
      display:flex;flex-direction:column;align-items:center;gap:8px;
      transition:all .8s cubic-bezier(.4,0,.2,1);
    }
    .shelf-group.hide{
      opacity:0;transform:scale(.5) translateY(30px);pointer-events:none;
    }
    .shelf-title{
      font-size:15px;font-weight:700;color:#475569;
      background:#f1f5f9;border-radius:10px;padding:3px 12px;
    }
    .shelf-title span{color:#dc2626}

    .bags-row{
      display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
      max-width:320px;
    }

    /* 单个苹果袋 */
    .apple-bag{
      width:52px;display:flex;flex-direction:column;align-items:center;
      gap:2px;transition:all .6s cubic-bezier(.34,1.56,.64,1);
      cursor:default;position:relative;
    }
    .apple-bag:hover{transform:scale(1.12) rotate(-3deg)}
    .apple-bag .bag-icon{
      width:48px;height:52px;
      background:linear-gradient(160deg,#fde68a,#f59e0b);
      border-radius:8px 8px 14px 14px;
      border:2.5px solid #d97706;
      position:relative;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 10px rgba(217,119,6,.25);
      font-size:22px;
    }
    .apple-bag .bag-icon::before{
      content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);
      width:28px;height:12px;background:#f59e0b;
      border-radius:6px 6px 0 0;border:2.5px solid #d97706;
      border-bottom:none;
    }
    .apple-bag .bag-icon::after{
      content:"🍎";font-size:20px;
    }
    .apple-bag .bag-price{
      font-size:11px;font-weight:700;color:#92400e;
      background:#fef3c7;border:1px solid #fbbf24;
      border-radius:6px;padding:0 5px;white-space:nowrap;
    }

    /* 袋子飞入动画 */
    .apple-bag.fly-in{
      animation:flyIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes flyIn{
      from{opacity:0;transform:scale(0) translateY(-40px) rotate(20deg)}
      to{opacity:1;transform:scale(1) translateY(0) rotate(0)}
    }

    /* 袋子合并动画 */
    .apple-bag.merge-left{
      animation:mergeLeft .8s ease forwards;
    }
    .apple-bag.merge-right{
      animation:mergeRight .8s ease forwards;
    }
    @keyframes mergeLeft{
      to{transform:translateX(60px) translateY(30px) scale(.6);opacity:0}
    }
    @keyframes mergeRight{
      to{transform:translateX(-60px) translateY(30px) scale(.6);opacity:0}
    }

    /* 合并后大组 */
    .merged-group{
      display:flex;flex-direction:column;align-items:center;gap:10px;
      transition:all .6s ease;
    }
    .merged-group.hide{opacity:0;transform:scale(.7);pointer-events:none;position:absolute}
    .merged-group.show{opacity:1;transform:scale(1);position:relative}

    .merged-shelf{
      display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
      max-width:500px;padding:8px;
      background:rgba(254,243,199,.5);border-radius:16px;
      border:2px dashed #f59e0b;
    }
    .merged-label{
      font-size:16px;font-weight:700;color:#92400e;
      background:#fef3c7;border-radius:12px;padding:4px 16px;
      border:2px solid #fbbf24;
    }

    /* ── 数学公式区 ── */
    .math-area{
      background:rgba(255,255,255,.92);border-radius:18px;
      padding:16px 20px;box-shadow:0 4px 20px rgba(0,0,0,.06);
      border:2px solid #c4b5fd;
      text-align:center;
    }
    .math-row{
      display:flex;align-items:center;justify-content:center;
      flex-wrap:wrap;gap:6px;margin:6px 0;
      font-size:20px;font-weight:700;
      transition:all .5s ease;
    }
    .math-row.hide{opacity:0;transform:translateY(10px);height:0;margin:0;overflow:hidden}
    .math-row.show{opacity:1;transform:translateY(0);height:auto}

    .m-chip{
      display:inline-flex;align-items:center;gap:4px;
      padding:4px 12px;border-radius:12px;
      transition:all .4s ease;
    }
    .m-left{background:#dbeafe;color:#1e40af;border:2px solid #93c5fd}
    .m-right{background:#fce7f3;color:#9d174d;border:2px solid #f9a8d4}
    .m-op{color:#64748b;font-size:22px;background:none;padding:0 2px}
    .m-eq{color:#059669;font-size:24px;background:none;padding:0 4px}
    .m-merged{background:#d1fae5;color:#065f46;border:2px solid #6ee7b7;font-size:22px}
    .m-result{
      background:linear-gradient(135deg,#fbbf24,#f97316);
      color:#fff;border:none;font-size:22px;
      box-shadow:0 4px 14px rgba(249,115,22,.35);
    }
    .m-chip.pulse{animation:chipPulse .6s ease}
    @keyframes chipPulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.15)}
    }

    /* 计算过程 */
    .calc-detail{
      display:flex;align-items:center;justify-content:center;
      gap:8px;flex-wrap:wrap;margin:4px 0;
      font-size:15px;color:#64748b;
      transition:all .5s ease;
    }
    .calc-detail.hide{opacity:0;height:0;margin:0;overflow:hidden}
    .calc-detail.show{opacity:1;height:auto}
    .calc-detail strong{color:#1e293b}

    /* ── 控制栏 ── */
    .controls{
      display:flex;justify-content:center;align-items:center;gap:12px;
      flex-wrap:wrap;
    }
    .btn{
      border:none;cursor:pointer;border-radius:14px;
      padding:12px 24px;font-size:16px;font-weight:700;
      display:inline-flex;align-items:center;gap:8px;
      transition:all .2s ease;
      box-shadow:0 4px 14px rgba(0,0,0,.12);
    }
    .btn:active{transform:scale(.96);box-shadow:0 2px 6px rgba(0,0,0,.1)}
    .btn-next{
      background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;
      font-size:18px;padding:14px 32px;
    }
    .btn-next:hover{box-shadow:0 6px 20px rgba(239,68,68,.35)}
    .btn-next[disabled]{opacity:.4;cursor:default;transform:none}
    .btn-reset{
      background:#fff;color:#64748b;border:2px solid #e2e8f0;
    }
    .btn-reset:hover{border-color:#94a3b8;color:#334155}
    .step-dots{
      display:flex;gap:6px;align-items:center;
    }
    .dot{
      width:12px;height:12px;border-radius:50%;
      background:#e2e8f0;transition:all .3s ease;
    }
    .dot.active{background:#f97316;transform:scale(1.2)}
    .dot.done{background:#10b981}

    /* ── 庆祝 ── */
    .confetti-container{
      position:fixed;top:0;left:0;width:100%;height:100%;
      pointer-events:none;z-index:999;
    }
    .confetti{
      position:absolute;width:10px;height:10px;
      border-radius:2px;
      animation:confettiFall 3s ease-out forwards;
    }
    @keyframes confettiFall{
      0%{transform:translateY(-10vh) rotate(0deg);opacity:1}
      100%{transform:translateY(110vh) rotate(720deg);opacity:0}
    }

    /* ── 总结卡片 ── */
    .summary-card{
      background:linear-gradient(135deg,#fef3c7,#fce7f3,#dbeafe);
      border-radius:18px;padding:20px;text-align:center;
      border:2px solid #fbbf24;
      box-shadow:0 8px 32px rgba(251,191,36,.2);
      transition:all .6s ease;
    }
    .summary-card.hide{opacity:0;transform:translateY(20px);height:0;padding:0;margin:0;overflow:hidden;border:none}
    .summary-card.show{opacity:1;transform:translateY(0);height:auto}
    .summary-card h3{font-size:20px;color:#dc2626;margin-bottom:8px}
    .summary-card .formula{
      font-size:22px;font-weight:700;color:#1e293b;
      background:rgba(255,255,255,.7);border-radius:12px;
      padding:10px 16px;margin:8px auto;display:inline-block;
    }
    .summary-card .insight{
      font-size:15px;color:#475569;margin-top:8px;line-height:1.6;
    }

    @media(max-width:600px){
      .hero h1{font-size:20px}
      .shelf{gap:20px}
      .apple-bag{width:44px}
      .apple-bag .bag-icon{width:40px;height:44px;font-size:18px}
      .math-row{font-size:16px}
      .m-chip{padding:3px 8px;font-size:14px!important}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>买苹果学数学</h1>
    <p>用买苹果的故事，理解"合在一起算"的秘密</p>
  </div>

  <div class="story-box">
    <div class="story-avatar">🧒</div>
    <div class="story-text" id="storyText">
      准备好了吗？我们一起去水果店买苹果吧！
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="stage-label" id="stageLabel">水果店货架</div>
    <div class="shelf" id="shelf">
      <div class="shelf-group" id="groupLeft">
        <div class="shelf-title">妈妈买的：<span id="leftCount">4</span> 袋</div>
        <div class="bags-row" id="bagsLeft"></div>
      </div>
      <div class="shelf-group" id="groupRight">
        <div class="shelf-title">爸爸买的：<span id="rightCount">9</span> 袋</div>
        <div class="bags-row" id="bagsRight"></div>
      </div>
    </div>
    <div class="merged-group hide" id="mergedGroup">
      <div class="merged-label" id="mergedLabel">全部放一起：<span id="mergedCount">13</span> 袋</div>
      <div class="merged-shelf" id="mergedShelf"></div>
    </div>
  </div>

  <div class="math-area" id="mathArea">
    <div class="math-row hide" id="mathRow1">
      <span class="m-chip m-left">4 × 25</span>
      <span class="m-chip m-op">+</span>
      <span class="m-chip m-right">9 × 25</span>
    </div>
    <div class="calc-detail hide" id="calcDetail1">
      <span>= <strong>100元</strong></span>
      <span>+</span>
      <span><strong>225元</strong></span>
      <span>=</span>
      <span><strong>325元</strong></span>
    </div>
    <div class="math-row hide" id="mathEq">
      <span class="m-chip m-eq">=</span>
    </div>
    <div class="math-row hide" id="mathRow2">
      <span class="m-chip m-merged">( 4 + 9 )</span>
      <span class="m-chip m-op">×</span>
      <span class="m-chip m-merged">25</span>
    </div>
    <div class="math-row hide" id="mathRow3">
      <span class="m-chip m-eq">=</span>
      <span class="m-chip m-result" id="chipResult">13 × 25 = 325元</span>
    </div>
  </div>

  <div class="summary-card hide" id="summaryCard">
    <h3>我发现了一个秘密！</h3>
    <div class="formula">4×25 + 9×25 = (4+9)×25 = 13×25</div>
    <div class="insight">
      不管是<strong>分开算</strong>还是<strong>合起来算</strong>，<br>
      花的钱都是一样多的！<strong>325元</strong><br><br>
      因为每袋苹果价钱一样，把袋数加起来再乘价钱，<br>
      和分开各算再加起来，结果相同！
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-reset" id="btnReset">↺ 重新来</button>
    <div class="step-dots" id="stepDots"></div>
    <button class="btn btn-next" id="btnNext">开始吧 ▶</button>
  </div>
</div>

<div class="confetti-container" id="confettiBox"></div>

<script>
  const $ = id => document.getElementById(id);

  const storyText = $('storyText');
  const bagsLeft = $('bagsLeft');
  const bagsRight = $('bagsRight');
  const groupLeft = $('groupLeft');
  const groupRight = $('groupRight');
  const mergedGroup = $('mergedGroup');
  const mergedShelf = $('mergedShelf');
  const stageLabel = $('stageLabel');
  const mathArea = $('mathArea');
  const btnNext = $('btnNext');
  const btnReset = $('btnReset');
  const stepDots = $('stepDots');
  const summaryCard = $('summaryCard');
  const confettiBox = $('confettiBox');

  const LEFT_COUNT = 4;
  const RIGHT_COUNT = 9;
  const PRICE = 25;
  const TOTAL = LEFT_COUNT + RIGHT_COUNT;

  const STEPS = [
    {
      story: '准备好了吗？我们一起去水果店买苹果吧！',
      btn: '开始吧 ▶'
    },
    {
      story: '苹果是一袋一袋卖的，每袋 <span class="price">25 元</span>。<br>妈妈先来了，她买了 <strong>4 袋</strong>苹果！',
      btn: '下一步 ▶'
    },
    {
      story: '爸爸也来了！他买了 <strong>9 袋</strong>苹果！<br>现在妈妈 4 袋，爸爸 9 袋，<strong>分开放着</strong>。',
      btn: '下一步 ▶'
    },
    {
      story: '我们来算算<strong>分开付</strong>要多少钱？<br>妈妈的 4 袋：<strong>4 × 25 = 100 元</strong><br>爸爸的 9 袋：<strong>9 × 25 = 225 元</strong><br>一共：<strong>100 + 225 = 325 元</strong>',
      btn: '下一步 ▶'
    },
    {
      story: '等等，我有个想法！<br>反正每袋苹果价钱都一样，能不能把<strong>所有袋子放到一起</strong>来算呢？',
      btn: '合在一起！ ▶'
    },
    {
      story: '看！妈妈的 <strong>4 袋</strong> 和爸爸的 <strong>9 袋</strong>放到一起了！<br>数一数，一共 <strong>4 + 9 = 13 袋</strong>！',
      btn: '下一步 ▶'
    },
    {
      story: '13 袋苹果，每袋 <span class="price">25 元</span>：<br><strong>13 × 25 = 325 元</strong><br><br>和分开算的结果<strong>一模一样</strong>！',
      btn: '看总结 ▶'
    },
    {
      story: '太棒了！你发现了一个数学秘密：<br><strong>分开算再加</strong> = <strong>合起来一起算</strong>！<br>这就叫 <strong>"乘法分配律"</strong>！',
      btn: '🎉 完成！'
    }
  ];

  let step = 0;

  function createBag(parent, delay) {
    const bag = document.createElement('div');
    bag.className = 'apple-bag fly-in';
    bag.style.animationDelay = delay + 'ms';
    bag.innerHTML = '<div class="bag-icon"></div><div class="bag-price">25元</div>';
    parent.appendChild(bag);
    return bag;
  }

  function initDots() {
    stepDots.innerHTML = '';
    for (let i = 0; i < STEPS.length; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      stepDots.appendChild(d);
    }
  }

  function updateDots() {
    const dots = stepDots.querySelectorAll('.dot');
    dots.forEach((d, i) => {
      d.className = 'dot';
      if (i < step) d.classList.add('done');
      else if (i === step) d.classList.add('active');
    });
  }

  function showMathRow(id) {
    const el = $(id);
    el.classList.remove('hide');
    el.classList.add('show');
    el.querySelectorAll('.m-chip').forEach((c, i) => {
      setTimeout(() => c.classList.add('pulse'), i * 200);
      setTimeout(() => c.classList.remove('pulse'), i * 200 + 600);
    });
  }

  function hideMathRow(id) {
    const el = $(id);
    el.classList.add('hide');
    el.classList.remove('show');
  }

  function launchConfetti() {
    const colors = ['#f97316','#ef4444','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = Math.random() * 2 + 's';
      c.style.animationDuration = (2 + Math.random() * 2) + 's';
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      confettiBox.appendChild(c);
    }
    setTimeout(() => confettiBox.innerHTML = '', 5000);
  }

  function goToStep(s) {
    step = s;
    storyText.innerHTML = STEPS[s].story;
    btnNext.textContent = STEPS[s].btn;
    btnNext.disabled = false;
    updateDots();

    switch (s) {
      case 0:
        bagsLeft.innerHTML = '';
        bagsRight.innerHTML = '';
        mergedShelf.innerHTML = '';
        groupLeft.classList.remove('hide');
        groupRight.classList.add('hide');
        mergedGroup.classList.add('hide');
        mergedGroup.classList.remove('show');
        stageLabel.textContent = '水果店货架';
        hideMathRow('mathRow1');
        hideMathRow('calcDetail1');
        hideMathRow('mathEq');
        hideMathRow('mathRow2');
        hideMathRow('mathRow3');
        summaryCard.classList.add('hide');
        summaryCard.classList.remove('show');
        break;

      case 1:
        groupLeft.classList.remove('hide');
        groupRight.classList.add('hide');
        bagsLeft.innerHTML = '';
        for (let i = 0; i < LEFT_COUNT; i++) createBag(bagsLeft, i * 150);
        stageLabel.textContent = '妈妈来买苹果啦！';
        break;

      case 2:
        groupRight.classList.remove('hide');
        bagsRight.innerHTML = '';
        for (let i = 0; i < RIGHT_COUNT; i++) createBag(bagsRight, i * 120);
        stageLabel.textContent = '爸爸也来买苹果啦！';
        break;

      case 3:
        showMathRow('mathRow1');
        setTimeout(() => showMathRow('calcDetail1'), 800);
        stageLabel.textContent = '分开算算钱';
        break;

      case 4:
        stageLabel.textContent = '想一想...能不能合起来？';
        break;

      case 5: {
        stageLabel.textContent = '所有苹果放到一起！';
        const leftBags = bagsLeft.querySelectorAll('.apple-bag');
        const rightBags = bagsRight.querySelectorAll('.apple-bag');
        leftBags.forEach((b, i) => {
          b.style.animationDelay = (i * 80) + 'ms';
          b.classList.add('merge-right');
        });
        rightBags.forEach((b, i) => {
          b.style.animationDelay = (i * 80) + 'ms';
          b.classList.add('merge-left');
        });

        setTimeout(() => {
          groupLeft.classList.add('hide');
          groupRight.classList.add('hide');
          mergedGroup.classList.remove('hide');
          mergedGroup.classList.add('show');
          mergedShelf.innerHTML = '';

          for (let i = 0; i < TOTAL; i++) {
            const bag = createBag(mergedShelf, i * 80);
            if (i < LEFT_COUNT) {
              bag.querySelector('.bag-icon').style.background =
                'linear-gradient(160deg,#bfdbfe,#3b82f6)';
              bag.querySelector('.bag-icon').style.borderColor = '#1d4ed8';
            }
          }
        }, 900);

        showMathRow('mathEq');
        setTimeout(() => showMathRow('mathRow2'), 1200);
        break;
      }

      case 6:
        stageLabel.textContent = '合起来算钱！';
        showMathRow('mathRow3');
        $('chipResult').classList.add('pulse');
        setTimeout(() => $('chipResult').classList.remove('pulse'), 600);
        break;

      case 7:
        summaryCard.classList.remove('hide');
        summaryCard.classList.add('show');
        stageLabel.textContent = '🎉 恭喜你发现了秘密！';
        btnNext.disabled = true;
        launchConfetti();
        break;
    }
  }

  function reset() {
    goToStep(0);
  }

  btnNext.addEventListener('click', () => {
    if (step < STEPS.length - 1) {
      goToStep(step + 1);
    }
  });

  btnReset.addEventListener('click', reset);

  initDots();
  goToStep(0);
</script>
</body>
</html>
