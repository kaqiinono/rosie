<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0f0f1a"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
  </defs>
  <!-- Book shape -->
  <rect x="96" y="120" width="320" height="280" rx="16" fill="#16213e" stroke="#e94560" stroke-width="3"/>
  <rect x="96" y="120" width="16" height="280" rx="8" fill="url(#ac)"/>
  <!-- Lines representing text -->
  <rect x="140" y="180" width="200" height="12" rx="6" fill="url(#ac)" opacity="0.9"/>
  <rect x="140" y="212" width="240" height="10" rx="5" fill="#f0f0ff" opacity="0.4"/>
  <rect x="140" y="238" width="220" height="10" rx="5" fill="#f0f0ff" opacity="0.4"/>
  <rect x="140" y="264" width="180" height="10" rx="5" fill="#f0f0ff" opacity="0.3"/>
  <!-- W letter -->
  <text x="140" y="348" font-family="Arial Black" font-weight="900" font-size="70" fill="url(#ac)">ROSIE</text>
  <!-- Star/sparkle -->
  <circle cx="380" cy="175" r="18" fill="#f5a623" opacity="0.9"/>
  <text x="371" y="183" font-size="22" fill="#0f0f1a">★</text>
</svg>
