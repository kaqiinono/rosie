<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学探险乐园</title>
  <style>
    :root {
      --bg: #f0f4ff;
      --text: #1e293b;
      --sub: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      min-height: 100vh;
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: var(--bg);
    }

    .bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 25% 15%, rgba(59,130,246,.07), transparent),
        radial-gradient(ellipse 60% 45% at 75% 80%, rgba(251,191,36,.08), transparent),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(139,92,246,.05), transparent),
        linear-gradient(160deg, #eef3ff 0%, #fef9ec 50%, #f0f4ff 100%);
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(70px);
      pointer-events: none; z-index: 0;
      animation: orbFloat 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 280px; height: 280px; top: -50px; left: -60px; background: rgba(59,130,246,.1) }
    .orb-2 { width: 240px; height: 240px; bottom: -30px; right: -50px; background: rgba(251,191,36,.1); animation-delay: -7s }
    .orb-3 { width: 180px; height: 180px; top: 40%; left: 60%; background: rgba(139,92,246,.07); animation-delay: -14s }
    @keyframes orbFloat {
      0% { transform: translate(0,0) scale(1) }
      50% { transform: translate(20px,-15px) scale(1.04) }
      100% { transform: translate(-10px,10px) scale(.97) }
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px 48px;
      gap: 28px;
    }

    /* ── 返回按钮 ── */
    .back-link {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      display: flex; align-items: center; gap: 6px;
      text-decoration: none; color: var(--sub);
      font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(12px);
      padding: 8px 14px; border-radius: 12px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      transition: all .2s;
    }
    .back-link:hover { color: var(--text); border-color: rgba(0,0,0,.12); transform: translateX(-2px) }

    /* ── Hero ── */
    .hero {
      text-align: center;
      max-width: 480px;
    }
    .hero-icon {
      font-size: 48px;
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) }
      50% { transform: translateY(-8px) }
    }
    .hero h1 {
      font-size: clamp(26px, 5vw, 34px);
      font-weight: 900;
      line-height: 1.3;
      margin-top: 8px;
      background: linear-gradient(135deg, #1e40af, #7c3aed, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--sub);
      margin-top: 6px;
      line-height: 1.6;
    }

    /* ── 卡片网格 ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 680px;
    }

    /* ── 课程卡片 ── */
    .card {
      position: relative;
      background: #fff;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .28s ease;
      box-shadow: 0 4px 20px rgba(15,23,42,.05), 0 1px 3px rgba(15,23,42,.04);
      border: 1px solid rgba(255,255,255,.8);
      display: flex;
      gap: 0;
    }
    .card:hover {
      transform: translateY(-5px) scale(1.005);
      box-shadow: 0 16px 44px rgba(15,23,42,.1), 0 4px 12px rgba(15,23,42,.05);
    }

    /* 左侧彩色侧边条 + 图标区 */
    .card-side {
      width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .card-side::before {
      content: "";
      position: absolute; inset: 0;
      opacity: .12;
    }
    .card-side .side-icon {
      font-size: 32px;
      position: relative;
      z-index: 1;
      transition: transform .3s ease;
    }
    .card:hover .side-icon { transform: scale(1.1) rotate(-5deg) }
    .card-side .side-num {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .06em;
      position: relative;
      z-index: 1;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .card.blue .card-side { background: linear-gradient(160deg, #dbeafe, #eff6ff) }
    .card.blue .card-side::before { background: #3b82f6 }
    .card.blue .side-num { background: rgba(59,130,246,.12); color: #1d4ed8 }

    .card.amber .card-side { background: linear-gradient(160deg, #fef3c7, #fffbeb) }
    .card.amber .card-side::before { background: #f59e0b }
    .card.amber .side-num { background: rgba(245,158,11,.12); color: #92400e }

    .card.violet .card-side { background: linear-gradient(160deg, #ede9fe, #f5f3ff) }
    .card.violet .card-side::before { background: #8b5cf6 }
    .card.violet .side-num { background: rgba(139,92,246,.12); color: #5b21b6 }

    /* 右侧内容区 */
    .card-body {
      flex: 1;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }
    .card-title {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
    }

    /* 标签 */
    .card-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .card.blue .tag { background: #dbeafe; color: #1e40af }
    .card.amber .tag { background: #fef3c7; color: #92400e }
    .card.violet .tag { background: #ede9fe; color: #5b21b6 }

    /* 底部入口按钮 */
    .card-enter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      margin-top: 2px;
      transition: all .22s;
    }
    .card.blue .card-enter { background: #eff6ff; color: #1d4ed8 }
    .card.amber .card-enter { background: #fffbeb; color: #92400e }
    .card.violet .card-enter { background: #f5f3ff; color: #5b21b6 }
    .card:hover.blue .card-enter { background: linear-gradient(135deg,#3b82f6,#6366f1); color: #fff }
    .card:hover.amber .card-enter { background: linear-gradient(135deg,#f59e0b,#f97316); color: #fff }
    .card:hover.violet .card-enter { background: linear-gradient(135deg,#8b5cf6,#6366f1); color: #fff }
    .enter-arrow {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      transition: transform .2s;
    }
    .card:hover .enter-arrow { transform: translateX(3px) }

    /* ── 装饰 ── */
    .card-deco {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: .04;
      z-index: 0;
    }
    .card.blue .card-deco { background: #3b82f6 }
    .card.amber .card-deco { background: #f59e0b }
    .card.violet .card-deco { background: #8b5cf6 }
    .deco-1 { width: 100px; height: 100px; top: -25px; right: -15px }
    .deco-2 { width: 60px; height: 60px; bottom: -15px; right: 30px }

    /* ── 底部 ── */
    .footer {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }

    @media (max-width: 500px) {
      .card { flex-direction: column }
      .card-side {
        width: 100%; height: 60px;
        flex-direction: row; gap: 10px;
        padding: 0 16px;
        justify-content: flex-start;
      }
      .page { padding: 24px 14px 36px; gap: 20px }
    }
  </style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<a class="back-link" href="/">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  返回首页
</a>

<div class="page">
  <section class="hero">
    <div class="hero-icon">🧮</div>
    <h1>数学探险乐园</h1>
    <p class="hero-sub">选一节课开始今天的数学冒险吧</p>
  </section>

  <section class="cards">

    <!-- 第35讲 · 归一问题 -->
    <a class="card blue" href="/math/ny/35.html">
      <div class="card-deco deco-1"></div>
      <div class="card-deco deco-2"></div>
      <div class="card-side">
        <div class="side-icon">🎯</div>
        <div class="side-num">第 35 讲</div>

      <div class="card-body">
        <div class="card-title">归一问题探险</div>
        <p class="card-desc">学会用倍比图解决归一问题，覆盖 5 大题型：基础归一、直接倍比、双归一、反向归一、变化归一。</p>
        <div class="card-tags">
          <span class="tag">归一问题</span>
          <span class="tag">倍比图</span>
          <span class="tag">29 道互动题</span>
        </div>
        <div class="card-enter">
          开始学习
          <span class="enter-arrow">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </span>
        </div>
      </div>
    </a>

    <!-- 第34讲 · 乘法分配律（袋子版） -->
    <a class="card violet" href="/math/ny/34.html">
      <div class="card-deco deco-1"></div>
      <div class="card-deco deco-2"></div>
      <div class="card-side">
        <div class="side-icon">🎁</div>
        <div class="side-num">第 34 讲</div>
      </div>
      <div class="card-body">
        <div class="card-title">一袋里有几个</div>
        <p class="card-desc">用袋子装东西的故事演示 4×25 + 9×25，看两袋合成一袋的过程，直观理解乘法分配律。</p>
        <div class="card-tags">
          <span class="tag">乘法分配律</span>
          <span class="tag">分步演示</span>
          <span class="tag">合并思维</span>
        </div>
        <div class="card-enter">
          开始学习
          <span class="enter-arrow">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </span>
        </div>
      </div>
    </a>
  </section>

  <div class="footer">Rosie 的数学探险乐园</div>
</div>
</body>
</html>
